name: release-windows-exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: Gemini OCR+ ${{ github.ref_name }}
          releaseBody: Windows EXE build generated by GitHub Actions.
          releaseDraft: false
          prerelease: false

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $bundleDir = "src-tauri/target/release/bundle"
          if (-not (Test-Path $bundleDir)) {
            throw "Bundle directory not found: $bundleDir"
          }

          $targets = Get-ChildItem -Path $bundleDir -Recurse -File | Where-Object {
            $_.Extension -in @(".exe", ".msi", ".zip")
          }
          if ($targets.Count -eq 0) {
            throw "No release artifacts found under $bundleDir"
          }

          $outFile = "SHA256SUMS.txt"
          if (Test-Path $outFile) {
            Remove-Item $outFile -Force
          }

          foreach ($f in $targets) {
            $hash = (Get-FileHash -LiteralPath $f.FullName -Algorithm SHA256).Hash.ToLower()
            $relative = Resolve-Path -LiteralPath $f.FullName -Relative
            "$hash  $relative" | Out-File -FilePath $outFile -Append -Encoding utf8
          }

          Get-Content $outFile

      - name: Upload checksum to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: SHA256SUMS.txt
